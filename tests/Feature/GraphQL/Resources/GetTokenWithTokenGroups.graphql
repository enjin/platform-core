query GetTokenWithTokenGroups(
  $collectionId: BigInt!
  $tokenId: EncodableTokenIdInput!
) {
  GetTokenWithTokenGroups: GetToken(collectionId: $collectionId, tokenId: $tokenId) {
    tokenId
    tokenGroups {
      position
      tokenGroup {
        id
        metadata
        attributes {
          key
          value
        }
      }
    }
  }
}

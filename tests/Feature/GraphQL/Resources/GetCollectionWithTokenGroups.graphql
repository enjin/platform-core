query GetCollectionWithTokenGroups(
  $collectionId: BigInt!
) {
  GetCollectionWithTokenGroups: GetCollection(collectionId: $collectionId) {
    collectionId
    tokenGroups {
      id
      attributes {
        key
        value
      }
      tokens {
        position
        token {
          tokenId
        }
      }
    }
  }
}
